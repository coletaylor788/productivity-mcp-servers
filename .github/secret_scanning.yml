# GitHub secret scanning configuration.
#
# Exclude eval datasets used by the mcp-hooks LLM evaluation harness.
# These files contain intentionally fake / synthetic credential-shaped
# strings used to measure classifier accuracy. Real-looking fixtures
# are stored base64-encoded as a defense-in-depth measure (see
# packages/mcp-hooks/evals/load.ts), but we exclude the directory from
# scanning so the inevitable plaintext placeholders, masked keys, and
# documentation prefixes don't generate false positives in the
# secret scanning UI.
#
# DO NOT add any directory to this allowlist that contains real
# production code, configuration, or any path where a real leaked
# secret might plausibly land.
paths-ignore:
  - "packages/mcp-hooks/evals/datasets/**"
  - "packages/mcp-hooks/evals/baselines/**"
